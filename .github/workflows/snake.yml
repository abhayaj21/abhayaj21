name: Generate Contribution Snake (With Private Contributions)

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:     # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate contribution snake (Dark Mode)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.svg?palette=github-light
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Include private contributions
          user_id: ${{ github.repository_owner }}

      - name: Push generated files
        uses: actions/upload-artifact@v3
        with:
          name: snake-artifacts
          path: dist/

      - name: Commit and push changes
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          mkdir -p output
          cp dist/github-contribution-grid-snake-dark.svg output/ || true
          cp dist/github-contribution-grid-snake.svg output/ || true
          
          git add output/ || true
          git commit -m "Update contribution snake graph with private contributions" || true
          git push origin main || git push origin master || true
